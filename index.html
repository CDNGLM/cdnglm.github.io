<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Interaccion</title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    <h1>Hello World!!</h1>
    <section>
        <h3>1. Botón con múltiples estados</h3>
        <button class="btn-interactivo">Interactúa conmigo</button>
        <p><small>(Hover, Active, Focus)</small></p>
    </section>

    <section>
        <h3>2. Campo de texto</h3>
        <input type="text" class="input-interactivo" placeholder="Haz clic para escribir...">
        <p><small>(Focus, Placeholder-shown)</small></p>
    </section>

    <section>
        <h3>3. Enlace visitado</h3>
        <a href="https://github.com" target="_blank" class="link-interactivo">Enlace a GitHub</a>
        <p><small>(Link, Visited)</small></p>
    </section>
</body>
</html>
